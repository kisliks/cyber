<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CyberSecurity</title>
    <style
        body { background: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #main-layout { display: flex; flex-direction: row; width: 98%; max-width: 1550px; height: 92vh; gap: 15px; }
        #game-outer { flex: 3; display: flex; flex-direction: column; }
        #game-container { background: #010101; border: 2px solid #00ff41; padding: 10px; position: relative; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,255,65,0.3); height: 100%; }
        #sidebar-right { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        #help-sidebar, #tips-sidebar { background: rgba(0, 15, 0, 0.95); border: 2px solid #00ff41; border-radius: 12px; padding: 15px; box-shadow: 0 0 15px rgba(0,255,65,0.1); }
        #help-sidebar { flex: 2; font-size: 13px; overflow-y: auto; }
        #tips-sidebar { flex: 1; border-color: #0044ff; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .t-bar-bg { background: #111; height: 10px; width: 100%; border: 1px solid #00ff41; margin-bottom: 8px; border-radius: 5px; overflow: hidden; }
        #t-bar { height: 100%; background: #00ff41; width: 100%; }
        .cv-wrap { position: relative; flex: 1; background: #050505; border: 1px solid #222; border-radius: 8px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas#game { max-width: 100%; max-height: 100%; object-fit: contain; }
        #joy-zone { position: absolute; bottom: 20px; left: 20px; width: 80px; height: 80px; background: rgba(0,255,65,0.05); border-radius: 50%; border: 2px solid rgba(0,255,65,0.2); }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 30px; height: 30px; background: #00ff41; border-radius: 50%; opacity: 0.4; pointer-events: none; }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .btn { font-family: inherit; font-size: 12px; padding: 14px 2px; text-align: center; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; background: #333; }
        .act-g { grid-column: span 3; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        #mg-ui { display: none; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: rgba(0,10,0,0.98); border: 2px solid #00ff41; padding: 20px; text-align: center; z-index: 180; border-radius: 15px; }
        #death { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        .key { color: #fff; font-weight: bold; background: #111; padding: 1px 5px; border-radius: 3px; border: 1px solid #00ff41; }
        @media (max-width: 900px) { #main-layout { flex-direction: column; } #sidebar-right { display: none; } }
    </style>
</head>
<body>

<div id="main-layout">
    <div id="game-outer">
        <div id="game-container">
            <div class="stats">
                <span>ОЧКИ: <span id="scr">0</span></span>
                <span>ЩИТ: <span id="sh-stat">ВЫКЛ</span></span>
                <span>HP: <span id="hp">3</span></span>
            </div>
            <div class="t-bar-bg"><div id="t-bar"></div></div>
            <div class="cv-wrap">
                <canvas id="game" width="1400" height="700"></canvas>
                <div id="joy-zone"><div id="joy-stick"></div></div>
                <div id="mg-ui">
                    <div style="color:#fff; margin-bottom:10px;">СИНХРОНИЗАЦИЯ...</div>
                    <div style="width:100%; height:15px; background:#000; border:1px solid #00ff41; position:relative; overflow:hidden;">
                        <div id="mg-target" style="position:absolute; width:60px; height:100%; background:#00ff41; opacity:0.5;"></div>
                        <div id="mg-slider" style="position:absolute; width:10px; height:100%; background:#fff; left:0;"></div>
                    </div>
                </div>
                <div id="death">
                    <h1 style="color:#ff003c;">ВЗЛОМАН</h1>
                    <button onclick="resetGame()" class="btn" style="background:#00ff41; color:#000; padding:10px 30px;">REBOOT</button>
                </div>
            </div>
            <div id="controls">
                <div class="act-g">
                    <button class="btn" onpointerdown="handleAction('Y')" style="background:#0044ff;">ПРИНЯТЬ (Y)</button>
                    <button class="btn" onpointerdown="handleAction('N')" style="background:#ff003c;">ОТКЛОНИТЬ (N)</button>
                </div>
                <button class="btn" onpointerdown="handleAction('B')" style="background:#774400;">СКАН (B)</button>
                <button class="btn" onpointerdown="handleAction('H')" style="background:#006622;">+здоровье (H)</button>
                <button class="btn" onpointerdown="handleAction('F')" style="background:#002266; border:1px solid #00ff41;">ЩИТ (F)</button>
            </div>
        </div>
    </div>
    <div id="sidebar-right">
        <div id="help-sidebar">
            <h3 style="text-align:center;">ПОЛНЫЙ МАНУАЛ</h3>
            <p>1. <b style="color:#00ff41">АНАЛИЗ:</b> Встань у левого терминала. Ссылка <b>зафиксирована</b>.</p>
            <p>2. <b style="color:#ff003c">УРОН:</b> Впустил вирус (Y на ОПАСНО) = <b style="color:#ff003c">-1 HP</b>.</p>
            <p>3. <b style="color:#ffae00">ПРОМАХ:</b> Ошибка в полоске = <b style="color:#ffae00">-100 Очков</b>.</p>
            <p>4. <b style="color:#ffae00">МАГАЗИН:</b> встань у правого терминала <b style="color:#ffae00">(магазина)</b> там ты можешь покупать улучшения, щит и +здоровье.</p>
            <p>5. <b style="color:#00ff41">СКАНЕР:</b> на первом уровне говорит с шансом 20%, на втором 40% и так далее.</p>
            <p>6. <b style="color:#ffae00">РАСХОДНИКИ:</b> +здоровье в магазине даёт одно здоровье, а щит даёт замену здоровью(в критичных ситуациях).</p>
        </div>
        <div id="tips-sidebar">
            <h4 style="color:#0044ff;">Cyber Tip</h4>
            <div id="tip-content">Загрузка...</div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const stick = document.getElementById('joy-stick');
const zone = document.getElementById('joy-zone');

let score, hp, av_lvl, currentReq, activeReq, gameOver, time, maxTime = 60, hasShield;
let mgActive, mgPos, mgDir = 1, mgTarget, mgKey, flash, debtTimer;
let keys = {}, joyX = 0, joyY = 0;

const cyberTips = ["Символ 'I' часто заменяет 'l'.", "Банки не просят CVV в SMS.", "Файлы .exe в почте - риск!", "0 вместо O — признак фишинга."];
const urls = [
    {u: "google.com", b: false}, {u: "googIe.com", b: true}, {u: "paypal.com", b: false}, {u: "paypaI.com", b: true},
    {u: "vk.com", b: false}, {u: "v-k.com", b: true}, {u: "discord.com", b: false}, {u: "d1scord.com", b: true},
    {u: "apple.com", b: false}, {u: "appIe.com", b: true}, {u: "netflix.com", b: false}, {u: "netfIix.com", b: true},
    {u: "steam-login.ru", b: true}, {u: "steampowered.com", b: false}, {u: "yandex.ru", b: false}, {u: "yandax.ru", b: true}
];

window.onkeydown = (e) => { let c = e.code.replace('Key',''); if(['Y','N','B','H','F'].includes(c)) handleAction(c); keys[e.code]=true; };
window.onkeyup = (e) => { keys[e.code]=false; };

zone.addEventListener('pointermove', (e) => {
    if (e.buttons !== 1 && e.pointerType === 'mouse') return;
    const rect = zone.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width/2, y = e.clientY - rect.top - rect.height/2;
    const dist = Math.min(rect.width/2, Math.hypot(x, y));
    const ang = Math.atan2(y, x);
    joyX = Math.cos(ang) * (dist/(rect.width/2)); joyY = Math.sin(ang) * (dist/(rect.height/2));
    stick.style.transform = `translate(${joyX*20}px, ${joyY*20}px)`;
});
zone.addEventListener('pointerup', () => { joyX = joyY = 0; stick.style.transform = 'translate(0,0)'; });

const player = { x: 700, y: 350, s: 45, speed: 9 };
const termL = { x: 150, y: 280, s: 130 }; 
const termR = { x: 1120, y: 280, s: 130 }; 

function resetGame() {
    score = 0; hp = 3; av_lvl = 1; gameOver = false; time = maxTime; hasShield = false; debtTimer = 0; flash = 0; mgDir = 1;
    player.x = 700; player.y = 350; currentReq = null; mgActive = false;
    document.getElementById('death').style.display = 'none';
    document.getElementById('tip-content').innerText = cyberTips[Math.floor(Math.random()*cyberTips.length)];
    requestAnimationFrame(gameLoop);
}

function handleAction(type) {
    if (gameOver) return;
    if (mgActive && type === mgKey) { confirmMG(); return; }
    const dL = Math.hypot(player.x - (termL.x + termL.s/2), player.y - (termL.y + termL.s/2));
    const dR = Math.hypot(player.x - (termR.x + termR.s/2), player.y - (termR.y + termR.s/2));
    
    if (dL < 160 && currentReq && ['Y','N'].includes(type)) {
        mgActive = true; mgKey = type; mgPos = 0; mgDir = 1; mgTarget = 20 + Math.random() * 180;
        activeReq = currentReq;
        document.getElementById('mg-ui').style.display = 'block';
        document.getElementById('mg-target').style.left = mgTarget + 'px';
    } else if (dR < 160) {
        if (type === 'B' && score >= av_lvl * 150) { score -= av_lvl * 150; av_lvl++; }
        if (type === 'H' && score >= 200 && hp < 5) { score -= 200; hp++; }
        if (type === 'F' && score >= 300 && !hasShield) { score -= 300; hasShield = true; }
    }
}

function confirmMG() {
    const hit = mgPos >= mgTarget && mgPos <= mgTarget + 60;
    mgActive = false; document.getElementById('mg-ui').style.display = 'none';
    let isVirus = activeReq.b;
    let madeMistake = (mgKey === 'Y' && isVirus) || (mgKey === 'N' && !isVirus);
    
    if (hit && !madeMistake) { score += 70; time = Math.min(maxTime, time + 10); } 
    else {
        if (hasShield) { hasShield = false; } 
        else {
            if (madeMistake && isVirus && mgKey === 'Y') hp--; 
            else score = Math.max(0, score - 100);
            flash = 20;
        }
    }
    currentReq = null;
}

function update() {
    if (gameOver) return;
    time -= 0.016; if (flash > 0) flash--;
    if (time <= 0 || hp <= 0) { gameOver = true; document.getElementById('death').style.display = 'flex'; }
    if (score <= 0) { debtTimer += 0.016; if (debtTimer >= 15) { hp--; debtTimer = 0; flash = 20; } } else { debtTimer = 0; }
    
    if (!mgActive) {
        let dx = (keys['ArrowLeft'] || keys['KeyA'] ? -1 : 0) + (keys['ArrowRight'] || keys['KeyD'] ? 1 : 0) + joyX;
        let dy = (keys['ArrowUp'] || keys['KeyW'] ? -1 : 0) + (keys['ArrowDown'] || keys['KeyS'] ? 1 : 0) + joyY;
        player.x = Math.max(0, Math.min(1350, player.x + dx * player.speed));
        player.y = Math.max(0, Math.min(650, player.y + dy * player.speed));
    } else {
        // Логика движения ползунка
        mgPos += (5 + (score / 800)) * mgDir; 
        if (mgPos > 210 || mgPos < 0) mgDir *= -1; 
        document.getElementById('mg-slider').style.left = mgPos + "px";
    }
    
    if (Math.hypot(player.x - (termL.x + termL.s/2), player.y - (termL.y + termL.s/2)) < 160 && !currentReq) {
        currentReq = urls[Math.floor(Math.random()*urls.length)];
        window.scanRes = (Math.random() < 0.7 - (av_lvl*0.1)) ? "???" : (currentReq.b ? "ОПАСНО" : "ЧИСТО");
    }
    document.getElementById('scr').innerText = Math.floor(score);
    document.getElementById('hp').innerText = hp;
    document.getElementById('sh-stat').innerText = hasShield ? "ВКЛ" : "ВЫКЛ";
    document.getElementById('t-bar').style.width = (time / maxTime * 100) + "%";
}

function draw() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, 1400, 700);
    ctx.strokeStyle = "rgba(0, 255, 65, 0.1)";
    for(let i=0; i<1400; i+=70) ctx.strokeRect(i,0,70,700);
    ctx.fillStyle = "#1a1a1a"; ctx.fillRect(termL.x, termL.y, termL.s, termL.s);
    ctx.strokeStyle = "#00ff41"; ctx.lineWidth = 4; ctx.strokeRect(termL.x, termL.y, termL.s, termL.s);
    if (currentReq) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 36px Courier New"; ctx.fillText("ТРАФИК: " + currentReq.u, 50, 80);
        ctx.fillStyle = window.scanRes === "ОПАСНО" ? "#ff003c" : "#00ff41";
        ctx.font = "bold 46px Courier New"; ctx.fillText("СКАНЕР: " + window.scanRes, 50, 145);
    }
    if (score <= 0 && !gameOver) {
        ctx.fillStyle = "#ff003c"; ctx.font = "bold 24px Courier New";
        ctx.fillText("ДОЛГ! HP ЧЕРЕЗ: " + (15 - debtTimer).toFixed(1) + "с", 450, 30);
    }
    ctx.fillStyle = "#1a1a1a"; ctx.fillRect(termR.x, termR.y, termR.s, termR.s);
    ctx.strokeStyle = "#774400"; ctx.strokeRect(termR.x, termR.y, termR.s, termR.s);
    ctx.font = "bold 18px Courier New";
    ctx.fillStyle = score >= av_lvl*150 ? "#00ff41" : "#774400"; ctx.fillText("[B] UP: " + (av_lvl*150), termR.x - 40, termR.y - 75);
    ctx.fillStyle = score >= 200 ? "#00ff41" : "#774400"; ctx.fillText("[H] HP: 200", termR.x - 40, termR.y - 45);
    ctx.fillStyle = score >= 300 ? "#00ff41" : "#774400"; ctx.fillText("[F] SH: 300", termR.x - 40, termR.y - 15);
    if (hasShield) { ctx.beginPath(); ctx.arc(player.x+22, player.y+22, 60, 0, Math.PI*2); ctx.strokeStyle = "#0044ff"; ctx.lineWidth = 5; ctx.stroke(); }
    ctx.fillStyle = "#00ff41"; ctx.shadowBlur = 15; ctx.shadowColor = "#00ff41";
    ctx.fillRect(player.x, player.y, player.s, player.s);
    ctx.shadowBlur = 0;
    if (flash > 0) { ctx.fillStyle = "rgba(255, 0, 60, 0.4)"; ctx.fillRect(0,0,1400,700); }
}
function gameLoop() { update(); draw(); if (!gameOver) requestAnimationFrame(gameLoop); }
resetGame();
</script>
</body>
</html>
