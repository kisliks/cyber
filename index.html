<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CyberSecurity Pro Mobile</title>
    <style>
        body { background: #000; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #game-outer { width: 100%; max-width: 1200px; box-sizing: border-box; }
        #game-container { background: #010101; border: 2px solid #00ff41; padding: 10px; position: relative; border-radius: 15px; box-shadow: 0 0 30px rgba(0,255,65,0.2); display: flex; flex-direction: column; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; font-size: clamp(12px, 3.5vw, 18px); margin-bottom: 5px; }
        .t-bar-bg { background: #111; height: 8px; width: 100%; border: 1px solid #00ff41; margin-bottom: 8px; border-radius: 4px; overflow: hidden; }
        #t-bar { height: 100%; background: linear-gradient(90deg, #00ff41, #004400); width: 100%; }
        .cv-wrap { position: relative; width: 100%; aspect-ratio: 1400 / 700; background: #050505; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        canvas#game { width: 100%; height: 100%; display: block; }
        
        /* Виртуальный джойстик */
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; background: rgba(0,255,65,0.1); border-radius: 50%; border: 1px solid rgba(0,255,65,0.3); z-index: 150; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #00ff41; border-radius: 50%; opacity: 0.5; }

        #mg-ui { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; max-width: 250px; background: rgba(0,20,0,0.95); border: 2px solid #00ff41; padding: 15px; text-align: center; z-index: 180; border-radius: 10px; }
        #death { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .btn { font-family: inherit; font-size: clamp(10px, 3vw, 14px); padding: 10px 2px; text-align: center; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .act-g { grid-column: span 3; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    </style>
</head>
<body>

<div id="game-outer">
    <div id="game-container">
        <div class="stats">
            <span>SCORE: <span id="scr">0</span></span>
            <span>SHIELD: <span id="sh-stat">OFF</span></span>
            <span>HP: <span id="hp">3</span></span>
        </div>
        <div class="t-bar-bg"><div id="t-bar"></div></div>

        <div class="cv-wrap">
            <canvas id="game" width="1400" height="700"></canvas>
            
            <div id="joystick-zone"><div id="joystick-stick"></div></div>

            <div id="mg-ui">
                <div style="font-size: 12px; margin-bottom: 8px; color: #fff;">SYNCING...</div>
                <div style="width: 100%; height: 20px; background: #000; position: relative; border: 1px solid #00ff41; overflow: hidden;">
                    <div id="mg-target" style="position: absolute; width: 60px; height: 100%; background: #00ff41; opacity: 0.6;"></div>
                    <div id="mg-slider" style="position: absolute; width: 8px; height: 100%; background: #fff; left: 0;"></div>
                </div>
            </div>

            <div id="death">
                <h2 style="color: #ff003c; text-align: center;">SYSTEM BREACH</h2>
                <button onclick="resetGame()" class="btn" style="background: #00ff41; color: #000; padding: 10px 20px;">REBOOT</button>
            </div>
        </div>

        <div id="controls">
            <div class="act-g">
                <button class="btn" onpointerdown="handleAction('Y')" style="background: #0044ff;">ACCEPT (Y)</button>
                <button class="btn" onpointerdown="handleAction('N')" style="background: #ff003c;">REJECT (N)</button>
            </div>
            <button class="btn" onpointerdown="handleAction('B')" style="background: #774400;">UPG (B)</button>
            <button class="btn" onpointerdown="handleAction('H')" style="background: #006622;">HEAL (H)</button>
            <button class="btn" onpointerdown="handleAction('F')" style="background: #002266; color: #00ff41; border: 1px solid #00ff41;">SHIELD (F)</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const stick = document.getElementById('joystick-stick');
const zone = document.getElementById('joystick-zone');

let score, hp, av_lvl, currentReq, activeReq = null, gameOver, time, maxTime = 60, hasShield = false;
let mgActive = false, mgPos = 0, mgDir = 1, mgTarget = 120, mgKey = '';
let scanResult = "...", commsMsg = "READY", commsTimer = 0, flash = 0;
let keys = {}, joyX = 0, joyY = 0;

const player = { x: 700, y: 350, s: 45, speed: 8 };
const termL = { x: 150, y: 280, s: 120 }; 
const termR = { x: 1130, y: 280, s: 120 }; 

const urls = [{u: "google.com", b: false}, {u: "free-gift.exe", b: true}, {u: "paypaI.com", b: true}, {u: "github.com", b: false}, {u: "googIe.com", b: true}, {u: "youtube.com", b: false}, {u: "bank-secure.net", b: true}, {u: "vk.com", b: false}, {u: "steam-comunitty.ru", b: true}];

// Джойстик логика
zone.addEventListener('pointermove', (e) => {
    if (e.buttons !== 1) return;
    const rect = zone.getBoundingClientRect();
    const centerX = rect.width / 2; const centerY = rect.height / 2;
    let x = e.clientX - rect.left - centerX; let y = e.clientY - rect.top - centerY;
    const dist = Math.min(centerX, Math.hypot(x, y));
    const angle = Math.atan2(y, x);
    joyX = Math.cos(angle) * (dist / centerX); joyY = Math.sin(angle) * (dist / centerY);
    stick.style.transform = `translate(${joyX * 35}px, ${joyY * 35}px)`;
});
zone.addEventListener('pointerup', () => { joyX = 0; joyY = 0; stick.style.transform = 'translate(0,0)'; });

window.onkeydown = (e) => { let c = e.code.replace('Key',''); if (['Y','N','B','H','F'].includes(c)) handleAction(c); keys[e.code] = true; };
window.onkeyup = (e) => { keys[e.code] = false; };

function resetGame() {
    score = 0; hp = 3; av_lvl = 1; gameOver = false; time = maxTime; hasShield = false;
    player.x = 700; player.y = 350; currentReq = null; mgActive = false;
    document.getElementById('death').style.display = 'none';
    requestAnimationFrame(gameLoop);
}

function handleAction(type) {
    if (gameOver) return;
    if (mgActive && type === mgKey) { confirmMG(); return; }
    const dL = Math.hypot(player.x - termL.x, player.y - termL.y);
    const dR = Math.hypot(player.x - termR.x, player.y - termR.y);
    if (dL < 150 && currentReq && (type === 'Y' || type === 'N')) {
        mgActive = true; mgKey = type; mgPos = 0; mgTarget = 40 + Math.random() * 150;
        activeReq = Object.assign({}, currentReq);
        document.getElementById('mg-ui').style.display = 'block';
        document.getElementById('mg-target').style.left = mgTarget + 'px';
    } else if (dR < 150) {
        if (type === 'B' && score >= av_lvl * 150) { score -= av_lvl * 150; av_lvl++; player.x -= 180; }
        else if (type === 'H' && score >= 200 && hp < 5) { score -= 200; hp++; player.x -= 180; }
        else if (type === 'F' && score >= 300 && !hasShield) { score -= 300; hasShield = true; player.x -= 180; }
    }
}

function confirmMG() {
    const hit = mgPos >= mgTarget && mgPos <= mgTarget + 60;
    mgActive = false; document.getElementById('mg-ui').style.display = 'none';
    let win = hit && ((mgKey === 'Y' && !activeReq.b) || (mgKey === 'N' && activeReq.b));
    if (win) { score += 50; time = Math.min(maxTime, time + 15); } 
    else { if (hasShield) hasShield = false; else { hp--; flash = 10; } }
    currentReq = null; player.x += 160;
}

function update() {
    if (gameOver) return;
    time -= 0.016; if (flash > 0) flash--;
    if (time <= 0 || hp <= 0) { gameOver = true; document.getElementById('death').style.display = 'flex'; }
    
    if (!mgActive) {
        let dx = (keys['ArrowLeft'] || keys['KeyA'] ? -1 : 0) + (keys['ArrowRight'] || keys['KeyD'] ? 1 : 0) + joyX;
        let dy = (keys['ArrowUp'] || keys['KeyW'] ? -1 : 0) + (keys['ArrowDown'] || keys['KeyS'] ? 1 : 0) + joyY;
        player.x += dx * player.speed; player.y += dy * player.speed;
        player.x = Math.max(0, Math.min(1350, player.x)); player.y = Math.max(0, Math.min(650, player.y));
    } else {
        mgPos += (5 + (score / 500)) * mgDir; if (mgPos > 240 || mgPos < 0) mgDir *= -1;
        document.getElementById('mg-slider').style.left = mgPos + 'px';
    }
    
    if (Math.hypot(player.x - termL.x, player.y - termL.y) < 150) {
        if (!currentReq) {
            currentReq = urls[Math.floor(Math.random()*urls.length)];
            scanResult = (Math.random() > (0.3 + av_lvl*0.1)) ? "???" : (currentReq.b ? "DANGER" : "CLEAN");
        }
    } else if (!mgActive) currentReq = null;

    document.getElementById('scr').innerText = Math.floor(score);
    document.getElementById('hp').innerText = hp;
    document.getElementById('sh-stat').innerText = hasShield ? "ON" : "OFF";
    document.getElementById('t-bar').style.width = (time / maxTime * 100) + "%";
}

function draw() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, 1400, 700);
    ctx.strokeStyle = "rgba(0, 255, 65, 0.05)";
    for(let i=0; i<1400; i+=70) ctx.strokeRect(i,0,70,700);

    // Терминал L (SCANNER)
    ctx.fillStyle = "#1a1a1a"; ctx.fillRect(termL.x, termL.y, termL.s, termL.s);
    ctx.strokeStyle = "#00ff41"; ctx.lineWidth = 3; ctx.strokeRect(termL.x, termL.y, termL.s, termL.s);
    ctx.fillStyle = "#001100"; ctx.fillRect(termL.x+10, termL.y+10, termL.s-20, 50);
    for(let i=0; i<3; i++) {
        ctx.fillStyle = (Math.sin(Date.now()/150 + i) > 0) ? "#00ff41" : "#003300";
        ctx.beginPath(); ctx.arc(termL.x + 30 + (i*30), termL.y + 80, 5, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = "#00ff41"; ctx.font = "bold 20px Courier New"; ctx.fillText("SCANNER", termL.x, termL.y - 15);
    if (currentReq) {
        ctx.fillStyle = "#fff"; ctx.fillText("URL: " + currentReq.u, termL.x - 20, termL.y + 150);
        ctx.fillStyle = scanResult === "DANGER" ? "#ff003c" : "#00ff41"; ctx.fillText("RES: " + scanResult, termL.x - 20, termL.y + 180);
    }

    // Терминал R (UPGRADE)
    ctx.fillStyle = "#1a1a1a"; ctx.fillRect(termR.x, termR.y, termR.s, termR.s);
    ctx.strokeStyle = "#774400"; ctx.strokeRect(termR.x, termR.y, termR.s, termR.s);
    ctx.strokeStyle = "#333";
    for(let i=15; i<termR.s-15; i+=12) { ctx.beginPath(); ctx.moveTo(termR.x+15, termR.y+i); ctx.lineTo(termR.x+termR.s-15, termR.y+i); ctx.stroke(); }
    ctx.fillStyle = "#774400"; ctx.fillRect(termR.x + termR.s - 10, termR.y + 20, 10, 40);
    ctx.fillText("UPGRADE", termR.x, termR.y - 15);

    // Player
    if (hasShield) {
        ctx.beginPath(); ctx.arc(player.x + player.s/2, player.y + player.s/2, 55, 0, Math.PI*2);
        ctx.strokeStyle = "#0044ff"; ctx.lineWidth = 4; ctx.stroke();
    }
    ctx.fillStyle = "#00ff41"; ctx.shadowBlur = 15; ctx.shadowColor = "#00ff41";
    ctx.fillRect(player.x, player.y, player.s, player.s);
    ctx.shadowBlur = 0;

    if (flash > 0) { ctx.fillStyle = `rgba(255, 0, 60, ${flash/10 * 0.4})`; ctx.fillRect(0,0,1400,700); }
}

function gameLoop() { update(); draw(); if (!gameOver) requestAnimationFrame(gameLoop); }
resetGame();
</script>
</body>
</html>
